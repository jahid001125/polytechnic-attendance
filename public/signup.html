<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Signup - Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd 0%, #0043a8 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .signup-card {
      background: white; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%; max-width: 460px;
    }
    .signup-header {
      background: linear-gradient(135deg, #0d6efd, #0043a8);
      color: white; padding: 30px; text-align: center;
      border-radius: 20px 20px 0 0;
    }
    .signup-header .logo {
      width: 70px; height: 70px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 12px; font-size: 30px;
    }
    .form-control, .form-select {
      border-radius: 10px; border: 2px solid #e9ecef; padding: 10px 15px;
    }
    .form-control:focus, .form-select:focus {
      border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.15);
    }
    .btn-signup {
      background: linear-gradient(135deg, #0d6efd, #0043a8);
      border: none; border-radius: 10px; padding: 12px;
      font-weight: 600; font-size: 16px; color: white;
    }
    .btn-signup:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13,110,253,0.4); color: white; }
    .alert { border-radius: 10px; }
  </style>
</head>
<body>
  <div class="signup-card">
    <div class="signup-header">
      <div class="logo"><i class="fas fa-user-plus"></i></div>
      <h5 class="fw-bold mb-1">Student Signup</h5>
      <p class="small opacity-75 mb-0">Admin approval required after signup</p>
    </div>
    <div class="p-4">
      <div id="alertBox" class="alert d-none mb-3"></div>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Enter your full name"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Create a password"/>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Department</label>
          <select id="department" class="form-select">
            <option value="CST">CST - Computer Science</option>
            <option value="EET">EET - Electrical Engineering</option>
            <option value="CEE">CEE - Civil Engineering</option>
            <option value="MT">MT - Mechanical Technology</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Semester</label>
          <select id="semester" class="form-select">
            <option>1st</option><option>2nd</option><option>3rd</option>
            <option>4th</option><option>5th</option><option>6th</option>
            <option>7th</option><option>8th</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Student ID</label>
          <input type="text" id="studentId" class="form-control" placeholder="e.g. CST-010"/>
        </div>
        <div class="col-12">
          <button class="btn btn-signup w-100" onclick="signup()">
            <i class="fas fa-paper-plane me-2"></i>Submit Signup Request
          </button>
        </div>
        <div class="col-12 text-center">
          <a href="/" class="text-muted small">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

<script>
  async function signup() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const department = document.getElementById('department').value;
    const semester = document.getElementById('semester').value;
    const studentId = document.getElementById('studentId').value.trim();
    const alertBox = document.getElementById('alertBox');

    if (!name || !email || !password || !studentId) {
      alertBox.className = 'alert alert-warning';
      alertBox.textContent = 'Please fill all fields!';
      alertBox.classList.remove('d-none');
      return;
    }

    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, department, studentId, semester })
    });
    const data = await res.json();

    if (data.success) {
      alertBox.className = 'alert alert-success';
      alertBox.textContent = data.message;
      alertBox.classList.remove('d-none');
      setTimeout(() => window.location.href = '/', 3000);
    } else {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = data.message;
      alertBox.classList.remove('d-none');
    }
  }
</script>
</body>
</html>
