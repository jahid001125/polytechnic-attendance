<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Panel - Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: linear-gradient(135deg, #1a6b3c, #0d4a2b); }
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .card-header {
      background: linear-gradient(135deg, #1a6b3c, #0d4a2b);
      color: white; border-radius: 15px 15px 0 0 !important;
      padding: 15px 20px;
    }
    .btn-generate {
      background: linear-gradient(135deg, #1a6b3c, #0d4a2b);
      border: none; border-radius: 10px; padding: 12px 30px;
      font-weight: 600; color: white;
    }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,107,60,0.4); color: white; }
    .qr-container {
      background: white; border-radius: 15px;
      padding: 20px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .qr-container img { width: 220px; height: 220px; border-radius: 10px; }
    .token-timer {
      font-size: 28px; font-weight: 700;
      color: white; padding: 10px 25px;
      border-radius: 50px; display: inline-block;
    }
    .token-timer.safe { background: #198754; }
    .token-timer.warning { background: #fd7e14; }
    .token-timer.danger { background: #dc3545; }
    .attendee-item {
      background: #f8f9fa; border-radius: 10px;
      padding: 10px 15px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .attendee-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #1a6b3c, #0d4a2b);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700;
    }
    .form-control, .form-select {
      border-radius: 10px; border: 2px solid #e9ecef; padding: 10px 15px;
    }
    .form-control:focus, .form-select:focus {
      border-color: #1a6b3c; box-shadow: 0 0 0 0.2rem rgba(26,107,60,0.15);
    }
    .stat-card {
      background: white; border-radius: 12px; padding: 20px;
      text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .stat-card .number { font-size: 32px; font-weight: 700; color: #1a6b3c; }
    .security-badge {
      background: #e8f5e9; border: 2px solid #1a6b3c;
      border-radius: 10px; padding: 8px 12px;
      font-size: 12px; color: #1a6b3c;
    }
    .progress { height: 8px; border-radius: 5px; }
    .qr-refresh-bar { transition: width 0.1s linear; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
  <span class="navbar-brand fw-bold"><i class="fas fa-chalkboard-teacher me-2"></i>Teacher Panel</span>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white" id="teacherName"></span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">
      <i class="fas fa-sign-out-alt me-1"></i>Logout
    </button>
  </div>
</nav>

<div class="container py-4">

  <div class="row g-3 mb-4">
    <div class="col-4">
      <div class="stat-card">
        <div class="number" id="totalSessions">0</div>
        <div class="text-muted small">Total Sessions</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="number" id="todaySessions">0</div>
        <div class="text-muted small">Today</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="number" id="totalStudents">0</div>
        <div class="text-muted small">Total Present</div>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header">
          <i class="fas fa-qrcode me-2"></i>Generate QR Code
        </div>
        <div class="card-body p-4">
          <div class="mb-3">
            <label class="form-label fw-semibold">Subject</label>
            <input type="text" id="subject" class="form-control" placeholder="e.g. Mathematics"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Department</label>
            <select id="department" class="form-select">
              <option value="CST">CST - Computer Science</option>
              <option value="EET">EET - Electrical Engineering</option>
              <option value="CEE">CEE - Civil Engineering</option>
              <option value="MT">MT - Mechanical Technology</option>
            </select>
          </div>

          <!-- Security Info -->
          <div class="security-badge mb-4">
            <i class="fas fa-shield-alt me-1"></i>
            <strong>Security Active:</strong> QR refreshes every 30 sec • GPS 50m limit
          </div>

          <button class="btn btn-generate w-100" onclick="startSession()">
            <i class="fas fa-map-marker-alt me-2"></i>Get Location & Generate QR
          </button>
          <div id="locationStatus" class="text-muted small text-center mt-2"></div>
        </div>
      </div>

      <!-- QR Display -->
      <div id="qrSection" class="mt-4 d-none">
        <div class="qr-container">
          <h6 class="fw-bold mb-1" id="qrSubject"></h6>
          <p class="text-muted small mb-2" id="qrDept"></p>

          <img id="qrImage" src="" alt="QR Code"/>

          <!-- 30 second countdown -->
          <div class="mt-3 mb-1">
            <span class="token-timer safe" id="tokenTimer">30</span>
          </div>
          <small class="text-muted">QR refreshes every 30 seconds</small>

          <!-- Progress bar -->
          <div class="progress mt-2 mb-3">
            <div class="progress-bar bg-success qr-refresh-bar" id="refreshBar" style="width:100%"></div>
          </div>

          <div class="text-muted small">
            <i class="fas fa-lock me-1"></i>Screenshot নিলে কাজ করবে না!
          </div>
        </div>
      </div>
    </div>

    <!-- Live Attendance -->
    <div class="col-md-7">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span><i class="fas fa-users me-2"></i>Live Attendance</span>
          <span class="badge bg-light text-dark" id="attendeeCount">0 present</span>
        </div>
        <div class="card-body">
          <div id="noSession" class="text-center py-5 text-muted">
            <i class="fas fa-qrcode fa-3x mb-3 opacity-25"></i>
            <p>Generate a QR code to start taking attendance</p>
          </div>
          <div id="attendeeList"></div>
        </div>
        <div class="card-footer bg-white" id="exportSection" style="display:none">
          <button class="btn btn-success btn-sm" onclick="exportCSV()">
            <i class="fas fa-download me-1"></i>Export CSV
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentUser = null;
  let currentSessionId = null;
  let tokenInterval = null;
  let pollInterval = null;
  let refreshInterval = null;
  let tokenTimeLeft = 30;

  window.onload = () => {
    const user = localStorage.getItem('user');
    if (!user) { window.location.href = '/'; return; }
    currentUser = JSON.parse(user);
    if (currentUser.role !== 'teacher') { window.location.href = '/'; return; }
    document.getElementById('teacherName').textContent = currentUser.name;
    loadStats();
  };

  async function loadStats() {
    try {
      const res = await fetch('/api/attendance');
      const data = await res.json();
      const myRecords = data.attendance.filter(a => a.teacherId === currentUser.id);
      const sessions = [...new Set(myRecords.map(a => a.sessionId))];
      const today = new Date().toLocaleDateString('en-BD');
      const todayRecords = myRecords.filter(a => a.date === today);
      const todaySessions = [...new Set(todayRecords.map(a => a.sessionId))];
      document.getElementById('totalSessions').textContent = sessions.length;
      document.getElementById('todaySessions').textContent = todaySessions.length;
      document.getElementById('totalStudents').textContent = myRecords.length;
    } catch(e) {}
  }

  function startSession() {
    const subject = document.getElementById('subject').value.trim();
    if (!subject) { alert('Please enter a subject!'); return; }

    document.getElementById('locationStatus').textContent = '📍 Getting your location...';

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        document.getElementById('locationStatus').textContent = `✅ Location found! (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)})`;
        await generateQR(pos.coords.latitude, pos.coords.longitude);
      },
      (err) => {
        document.getElementById('locationStatus').textContent = '⚠️ Location denied! GPS check disabled.';
        generateQR(null, null);
      }
    );
  }

  async function generateQR(lat, lng) {
    const subject = document.getElementById('subject').value.trim();
    const department = document.getElementById('department').value;

    clearInterval(tokenInterval);
    clearInterval(pollInterval);
    clearInterval(refreshInterval);

    const res = await fetch('/api/generate-qr', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacherId: currentUser.id, subject, department,
        teacherLat: lat, teacherLng: lng
      })
    });
    const data = await res.json();
    currentSessionId = data.sessionId;

    document.getElementById('qrSection').classList.remove('d-none');
    document.getElementById('qrImage').src = data.qrImage;
    document.getElementById('qrSubject').textContent = subject;
    document.getElementById('qrDept').textContent = department;
    document.getElementById('noSession').style.display = 'none';
    document.getElementById('exportSection').style.display = 'block';

    startTokenTimer();
    pollInterval = setInterval(fetchAttendees, 3000);
    fetchAttendees();
  }

  function startTokenTimer() {
    tokenTimeLeft = 30;
    updateTimerUI();

    tokenInterval = setInterval(async () => {
      tokenTimeLeft--;
      updateTimerUI();

      if (tokenTimeLeft <= 0) {
        // Refresh QR
        const res = await fetch(`/api/refresh-qr/${currentSessionId}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          document.getElementById('qrImage').src = data.qrImage;
          tokenTimeLeft = 30;
        }
      }
    }, 1000);
  }

  function updateTimerUI() {
    const timerEl = document.getElementById('tokenTimer');
    const barEl = document.getElementById('refreshBar');
    timerEl.textContent = tokenTimeLeft + 's';
    const pct = (tokenTimeLeft / 30) * 100;
    barEl.style.width = pct + '%';

    if (tokenTimeLeft > 15) {
      timerEl.className = 'token-timer safe';
      barEl.className = 'progress-bar bg-success qr-refresh-bar';
    } else if (tokenTimeLeft > 7) {
      timerEl.className = 'token-timer warning';
      barEl.className = 'progress-bar bg-warning qr-refresh-bar';
    } else {
      timerEl.className = 'token-timer danger';
      barEl.className = 'progress-bar bg-danger qr-refresh-bar';
    }
  }

  async function fetchAttendees() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/session/${currentSessionId}`);
    const data = await res.json();
    if (!data.success) return;

    const attendees = data.session.attendees;
    document.getElementById('attendeeCount').textContent = `${attendees.length} present`;

    const list = document.getElementById('attendeeList');
    if (attendees.length === 0) {
      list.innerHTML = '<div class="text-center text-muted py-3"><i class="fas fa-clock me-2"></i>Waiting for students...</div>';
      return;
    }
    list.innerHTML = attendees.map(a => `
      <div class="attendee-item">
        <div class="attendee-avatar">${a.studentName.charAt(0)}</div>
        <div>
          <div class="fw-semibold">${a.studentName}</div>
          <div class="text-muted small">${a.studentId} • ${a.time}</div>
        </div>
        <span class="badge bg-success ms-auto">Present</span>
      </div>
    `).join('');
  }

  function exportCSV() {
    if (!currentSessionId) return;
    fetch(`/api/session/${currentSessionId}`)
      .then(r => r.json())
      .then(data => {
        if (!data.success) return;
        const rows = [['Name', 'Student ID', 'Department', 'Time']];
        data.session.attendees.forEach(a => rows.push([a.studentName, a.studentId, a.department, a.time]));
        const csv = rows.map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `attendance_${data.session.subject}.csv`;
        a.click();
      });
  }

  function logout() { localStorage.removeItem('user'); window.location.href = '/'; }
</script>
</body>
</html>
