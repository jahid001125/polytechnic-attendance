<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Polytechnic Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a6b3c 0%, #0d4a2b 50%, #092d1a 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%; max-width: 420px;
    }
    .login-header {
      background: linear-gradient(135deg, #1a6b3c, #0d4a2b);
      color: white; padding: 35px 30px; text-align: center;
      border-radius: 20px 20px 0 0;
    }
    .login-header .logo {
      width: 80px; height: 80px; background: rgba(255,255,255,0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 15px; font-size: 35px;
    }
    .login-header h4 { font-weight: 700; margin: 0; }
    .login-header p { opacity: 0.85; font-size: 13px; margin: 5px 0 0; }
    .login-body { padding: 35px 30px; }
    .form-control {
      border-radius: 10px; padding: 12px 15px;
      border: 2px solid #e9ecef; transition: all 0.3s;
    }
    .form-control:focus { border-color: #1a6b3c; box-shadow: 0 0 0 0.2rem rgba(26,107,60,0.15); }
    .input-group-text {
      border-radius: 10px 0 0 10px; background: #f8f9fa;
      border: 2px solid #e9ecef; border-right: none; color: #1a6b3c;
    }
    .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
    .btn-login {
      background: linear-gradient(135deg, #1a6b3c, #0d4a2b);
      border: none; border-radius: 10px; padding: 12px;
      font-weight: 600; font-size: 16px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,107,60,0.4); }
    .btn-signup-link {
      border: 2px solid #1a6b3c; color: #1a6b3c;
      border-radius: 10px; padding: 10px;
      font-weight: 600; background: white; transition: all 0.3s;
    }
    .btn-signup-link:hover { background: #1a6b3c; color: white; }
    .alert { border-radius: 10px; }
    .demo-accounts { background: #f8f9fa; border-radius: 10px; padding: 12px 15px; font-size: 12px; }
    .demo-accounts strong { color: #1a6b3c; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="logo"><i class="fas fa-graduation-cap"></i></div>
      <h4>Polytechnic Attendance</h4>
      <p>Smart Campus Attendance Management System</p>
    </div>
    <div class="login-body">
      <div id="alertBox" class="alert d-none"></div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
        </div>
      </div>
      <button class="btn btn-login btn-primary w-100 text-white mb-3" onclick="login()">
        <i class="fas fa-sign-in-alt me-2"></i>Login
      </button>
      <a href="/signup" class="btn btn-signup-link w-100 text-center d-block mb-3">
        <i class="fas fa-user-plus me-2"></i>Student Signup
      </a>

      <div class="demo-accounts">
        <strong><i class="fas fa-info-circle me-1"></i>Demo Accounts:</strong><br/>
        <span class="text-muted">Admin:</span> admin@poly.edu / admin123<br/>
        <span class="text-muted">Teacher:</span> rahman@poly.edu / teacher123<br/>
        <span class="text-muted">Student:</span> rahim@poly.edu / student123
      </div>
    </div>
  </div>

<script>
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const alertBox = document.getElementById('alertBox');

    if (!email || !password) {
      alertBox.className = 'alert alert-warning';
      alertBox.textContent = 'Please enter email and password!';
      alertBox.classList.remove('d-none');
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('user', JSON.stringify(data.user));
        if (data.user.role === 'admin') window.location.href = '/admin';
        else if (data.user.role === 'teacher') window.location.href = '/teacher';
        else window.location.href = '/student';
      } else {
        alertBox.className = 'alert alert-danger';
        alertBox.textContent = data.message;
        alertBox.classList.remove('d-none');
      }
    } catch(e) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = 'Server error!';
      alertBox.classList.remove('d-none');
    }
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
